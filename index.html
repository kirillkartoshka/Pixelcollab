<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelCollab — Пиксельный стиль</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            color: #e0e0ff;
            font-family: 'Inter', sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px 20px;
            background: rgba(20, 20, 40, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }

        #toolbar {
            background: rgba(30, 30, 50, 0.95);
            padding: 12px 20px;
            border-radius: 12px;
            margin: 15px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .primary {
            background: #5e5ce6;
            color: white;
        }

        .secondary {
            background: #33334d;
            color: #ddd;
        }

        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            background: #0a0a0f;
        }

        #canvas {
            border: 4px solid #444466;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            image-rendering: pixelated;
            background: #0a0a0f;
            cursor: crosshair;
        }

        #palette {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(36px, 1fr));
            gap: 8px;
            margin: 15px auto;
            max-width: 560px;
            padding: 0 15px;
        }

        .color {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 3px solid #222;
            cursor: pointer;
        }

        .color.active {
            border-color: #5e5ce6;
            box-shadow: 0 0 0 4px rgba(94, 92, 230, 0.4);
        }

        /* Стиль для подписи внизу */
        .site-footer {
            margin-top: auto;
            padding: 14px 20px;
            background: rgba(20, 20, 40, 0.9);
            border-top: 2px solid #2e2e4a;
            color: #aaaacc;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            backdrop-filter: blur(6px);
        }

        .site-footer span {
            color: #c0c0e0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <h1>PixelCollab</h1>
        <div>👥 Онлайн: <span id="userCount">1</span></div>
    </header>

    <div id="toolbar">
        <label>Размер пикселя: <span id="sizeValue">8</span>px</label>
        <input type="range" id="pixelSize" min="4" max="20" value="8" oninput="updateSize()">

        <button class="secondary" onclick="zoomIn()">🔍 +</button>
        <button class="secondary" onclick="zoomOut()">🔍 -</button>
        <button class="primary" onclick="saveImage()">💾 Сохранить</button>
        <button class="secondary" onclick="undo()">↩️ Отменить</button>
    </div>

    <div id="canvas-container">
        <canvas id="canvas" width="1280" height="720"></canvas>
    </div>

    <div id="palette"></div>

    <!-- 👇 Подпись by Kirll Kondrotovich -->
    <footer class="site-footer">
        by <span>Kirll Kondrotovich</span>
    </footer>

    <script>
        // ==================== ВСТАВЬ СВОЙ FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_ПРОЕКТ.firebaseapp.com",
            databaseURL: "https://ВАШ_ПРОЕКТ-default-rtdb.firebaseio.com",
            projectId: "ВАШ_ПРОЕКТ",
            storageBucket: "ВАШ_ПРОЕКТ.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:xxxxxxxxxxxxxxxx"
        };
        // =====================================================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const canvasRef = db.ref('pixels');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let pixelSize = 8;
        let currentColor = '#ff3b5c';
        let isDrawing = false;
        let scale = 1;

        const colors = ['#000000', '#ffffff', '#ff3b5c', '#00ff9f', '#3b9eff', '#ffd700', '#ff00ff', '#00f0ff',
            '#ff8c00', '#c724ff', '#00ff7f', '#ff007f', '#666666', '#222222', '#bbbbbb', '#ff6699', '#66ff99'
        ];

        function createPalette() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            colors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'color';
                div.style.backgroundColor = color;
                if (color === currentColor) div.classList.add('active');
                div.onclick = () => {
                    currentColor = color;
                    document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                };
                palette.appendChild(div);
            });
        }

        function drawPixel(x, y, color = currentColor) {
            ctx.fillStyle = color;
            const px = Math.floor(x / pixelSize) * pixelSize;
            const py = Math.floor(y / pixelSize) * pixelSize;
            ctx.fillRect(px, py, pixelSize, pixelSize);
            canvasRef.child(`${Math.floor(px/pixelSize)},${Math.floor(py/pixelSize)}`).set(color);
        }

        function updateSize() {
            pixelSize = parseInt(document.getElementById('pixelSize').value);
            document.getElementById('sizeValue').textContent = pixelSize;
        }

        function zoomIn() {
            scale = Math.min(scale + 0.2, 5);
            canvas.style.transform = `scale(${scale})`;
        }

        function zoomOut() {
            scale = Math.max(scale - 0.2, 0.5);
            canvas.style.transform = `scale(${scale})`;
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `pixelcollab-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function undo() {
            location.reload();
        }

        // Firebase sync
        canvasRef.on('child_added', snap => {
            const [x, y] = snap.key.split(',').map(Number);
            ctx.fillStyle = snap.val();
            ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
        });

        canvasRef.on('child_changed', snap => {
            const [x, y] = snap.key.split(',').map(Number);
            ctx.fillStyle = snap.val();
            ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
        });

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: ((e.clientX || e.touches[0].clientX) - rect.left) / scale,
                y: ((e.clientY || e.touches[0].clientY) - rect.top) / scale
            };
        }

        canvas.addEventListener('mousedown', e => {
            isDrawing = true;
            const c = getCoords(e);
            drawPixel(c.x, c.y);
        });
        canvas.addEventListener('mousemove', e => {
            if (isDrawing) {
                const c = getCoords(e);
                drawPixel(c.x, c.y);
            }
        });
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', e => {
            isDrawing = true;
            const c = getCoords(e);
            drawPixel(c.x, c.y);
            e.preventDefault();
        });
        canvas.addEventListener('touchmove', e => {
            if (isDrawing) {
                const c = getCoords(e);
                drawPixel(c.x, c.y);
                e.preventDefault();
            }
        });
        window.addEventListener('touchend', () => isDrawing = false);

        // Wheel zoom
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            if (e.deltaY < 0) zoomIn();
            else zoomOut();
        });

        // Init
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        createPalette();
    </script>
</body>
</html>
